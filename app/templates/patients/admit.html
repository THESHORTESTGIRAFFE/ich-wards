{% extends "layout.html" %}
{% block content %}
    <h1>Admit Patient: {{ patient.name }}</h1>
    <form method="POST" action="">
        {{ form.hidden_tag() }}
        <div>
            {{ form.ward.label }}<br>
            {{ form.ward() }}
            {% for error in form.ward.errors %}
                <span style="color: red;">[{{ error }}]</span>
            {% endfor %}
        </div>
        <div>
            {{ form.submit() }}
        </div>
    </form>
{% endblock %}
